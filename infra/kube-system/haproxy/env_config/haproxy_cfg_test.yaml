      option tcp-check
      default-server inter 3s fall 3 rise 2 init-addr none
      # ATL primary node IP — NodePort 30081 maps to app4 MariaDB
      server atl-primary $IP_ADDR:30081 check

    # ---- app5 MariaDB (TCP cross-cluster replication) ----
    # LA standby replicates from ATL primary via this frontend.
    # Pods on LA use haproxy.kube-system.svc.cluster.local:3336 as REPL_HOST.
    frontend app5-mariadb-in
      bind *:3336
      mode tcp
      option tcplog
      default_backend app5-mariadb-backend

    backend app5-mariadb-backend
      mode tcp
      balance first
      option tcp-check
      default-server inter 3s fall 3 rise 2 init-addr none
      # ATL primary node IP — NodePort 30085 maps to app5 MariaDB
      server atl-primary $IP_ADDR:30085 check

    # ---- app6 MariaDB (TCP cross-cluster replication) ----
    # LA standby replicates from ATL primary via this frontend.
    # Pods on LA use haproxy.kube-system.svc.cluster.local:3341 as REPL_HOST.
    frontend app6-mariadb-in
      bind *:3341
      mode tcp
      option tcplog
      default_backend app6-mariadb-backend

    backend app6-mariadb-backend
      mode tcp
      balance first
      option tcp-check
      default-server inter 3s fall 3 rise 2 init-addr none
      # ATL primary node IP — NodePort 30087 maps to app6 MariaDB
      server atl-primary $IP_ADDR:30087 check

    # ---- app7 MariaDB (TCP cross-cluster replication) ----
    # LA standby replicates from ATL primary via this frontend.
    # Pods on LA use haproxy.kube-system.svc.cluster.local:3337 as REPL_HOST.
    frontend app7-mariadb-in
      bind *:3337
      mode tcp
      option tcplog
      default_backend app7-mariadb-backend

    backend app7-mariadb-backend
      mode tcp
      balance first
      option tcp-check
      default-server inter 3s fall 3 rise 2 init-addr none
      # ATL primary node IP — NodePort 30083 maps to app7 MariaDB
      server atl-primary $IP_ADDR:30083 check

    # ---- app8 MariaDB (TCP cross-cluster replication) ----
    # LA standby replicates from ATL primary via this frontend.
    # Pods on LA use haproxy.kube-system.svc.cluster.local:3342 as REPL_HOST.
    frontend app8-mariadb-in
      bind *:3342
      mode tcp
      option tcplog
      default_backend app8-mariadb-backend

    backend app8-mariadb-backend
      mode tcp
      balance first
      option tcp-check
      default-server inter 3s fall 3 rise 2 init-addr none
      # ATL primary node IP — NodePort 30086 maps to app8 MariaDB
      server atl-primary $IP_ADDR:30086 check