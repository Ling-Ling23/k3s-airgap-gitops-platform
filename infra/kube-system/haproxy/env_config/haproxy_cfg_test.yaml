      default_backend app2-mariadb-backend

    backend app2-mariadb-backend
      mode tcp
      balance first
      option tcp-check
      default-server inter 3s fall 3 rise 2 init-addr none
      # ATL primary node IP — NodePort 30082 maps to app2 MariaDB
      server atl-primary $IP_ADDR:30082 check

    # ---- app4 MariaDB (TCP cross-cluster replication) ----
    # LA standby replicates from ATL primary via this frontend.
    # Pods on LA use haproxy.kube-system.svc.cluster.local:3340 as REPL_HOST.
