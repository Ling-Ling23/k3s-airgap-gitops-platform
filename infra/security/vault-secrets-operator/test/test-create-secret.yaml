apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: my-test-config
  namespace: kube-system
spec:
  vaultAuthRef: vaultauth-kube-system
  type: kv-v2
  mount: k3s              # change to your KV mount name (often "secret" or "kv")
  path: testconfig     # change to your secret path
  refreshAfter: 1m
  destination:
    create: true
    name: my-test-config   # Kubernetes Secret name to create