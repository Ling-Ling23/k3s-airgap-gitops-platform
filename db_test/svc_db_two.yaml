apiVersion: v1
kind: Service
metadata:
  labels:
    app: dbtwo-database
  name: dbtwo-mariadb
  namespace: team1
spec:
  clusterIP: None   # headless — required for StatefulSet DNS
  ports:
    - name: mysql
      port: 3306
      protocol: TCP
      targetPort: 3306
  selector:
    app: dbtwo-data