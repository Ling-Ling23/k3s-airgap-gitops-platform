apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: team1-shared-app-secrets
  namespace: team2
spec:
  vaultAuthRef: vaultauth-team2
  type: kv-v2
  mount: k3s              # change to your KV mount name (often "secret" or "kv")
  path: env_shared/apps_team1/team1/shared_app_secrets
  refreshAfter: 1m
  destination:
    create: true
    name: team1-shared-app-secrets   # Kubernetes Secret name to get