apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: team2-database-roots
  namespace: team2
spec:
  vaultAuthRef: vaultauth-team2
  type: kv-v2
  mount: k3s              # change to your KV mount name (often "secret" or "kv")
  path: env_shared/apps_team2/database-roots
  refreshAfter: 1m
  destination:
    create: true
    name: team2-database-roots  # Kubernetes Secret name to get