apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: team1-team1-database-roots
  namespace: team1
spec:
  vaultAuthRef: vaultauth-team1
  type: kv-v2
  mount: k3s              # change to your KV mount name (often "secret" or "kv")
  path: env_shared/apps_team1/team1/database-roots
  refreshAfter: 1m
  destination:
    create: true
    name: team1-database-roots  # Kubernetes Secret name to get