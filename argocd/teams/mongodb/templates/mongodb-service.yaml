# Headless service — required by StatefulSet for stable pod DNS (mongodb-0.mongodb.<namespace>.svc.cluster.local)
apiVersion: v1
kind: Service
metadata:
  name: mongodb-team1
  namespace: {{ .Values.namespace }}
  labels:
    app: mongodb
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/part-of: {{ index .Values.labels "part-of" }}
    app.kubernetes.io/managed-by: {{ index .Values.labels "managed-by" }}
    team: {{ .Values.labels.team }}
spec:
  clusterIP: None
  selector:
    app: mongodb
  ports:
    - name: mongodb
      protocol: TCP
      port: 28017
      targetPort: 28017
---
# NodePort service — for external access and cross-cluster replica set connectivity
apiVersion: v1
kind: Service
metadata:
  name: mongodb-nodeport-team1
  namespace: {{ .Values.namespace }}
  labels:
    app: mongodb
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/part-of: {{ index .Values.labels "part-of" }}
    app.kubernetes.io/managed-by: {{ index .Values.labels "managed-by" }}
    team: {{ .Values.labels.team }}
spec:
  type: NodePort
  selector:
    app: mongodb
  ports:
    - name: mongodb
      protocol: TCP
      port: 28017
      targetPort: 28017
      nodePort: 30017