apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-config
  namespace: {{ .Values.namespace }}
data:
  mongo.conf: |
    storage:
      engine: wiredTiger
      dbPath: "/data/db"
      directoryPerDB: true
    systemLog:
      timeStampFormat: iso8601-utc
    processManagement:
      fork: false
    net:
      bindIpAll: true
      port: 28017
      wireObjectCheck: true
      unixDomainSocket:
        enabled: true
      tls:
        mode: allowTLS
        certificateKeyFile: /run/tls/infrateam.pem
        allowInvalidCertificates: true
        CAFile: /run/tls/tls.crt #ca.crt 
        allowInvalidHostnames: true
        allowConnectionsWithoutCertificates: true
    security:
      keyFile: /run/secrets/mongodb.key
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-init-script
  namespace: {{ .Values.namespace }}
data:
  init-mongo.js: |
    db = db.getSiblingDB('team1_mongo');

    if (!db.getUser('mongo_prod_user')) {
      db.createUser({
        user: '$user',
        pwd: '$pw',
        roles: [{ role: 'readWrite', db: 'team1_mongo' }]
      });
    }

    // Ensure the database exists by inserting a test document
    db.test.insertMany([
      { value: '1' },
      { value: '2' },
      { value: '3' }
    ]);