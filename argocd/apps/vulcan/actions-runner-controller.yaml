apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: actions-runner-controller
  namespace: argocd
  labels:
    team: k3s-admin
    app.kubernetes.io/name: actions-runner-controller
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: vulcan
  annotations:
    description: "ApplicationSet for ARC operator - installs CRDs and the scale-set listener"
spec:
  generators:
  - clusters:
      selector:
        matchExpressions:
        - key: env
          operator: In
          values: [dev]
  template:
    metadata:
      name: "actions-runner-controller-{{metadata.labels.env}}"
      namespace: argocd
      labels:
        app.kubernetes.io/name: actions-runner-controller
        app.kubernetes.io/instance: "actions-runner-controller-{{metadata.labels.env}}"
        app.kubernetes.io/managed-by: argocd
        app.kubernetes.io/part-of: vulcan
        environment: "{{metadata.labels.env}}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: infra
      source:
        # Manifests rendered from Helm chart on an internet-connected machine (air-gapped / JFrog setup).
        # Run 'helm template' once and commit the output. See docs/arc.md for the exact commands.
        $APP_SOME_GH_REPOSITORY-k3s_deployment.git
        targetRevision: "{{metadata.labels.env}}"
        path: argocd/vulcan/actions-runner-controller
        directory:
          recurse: false
      destination:
        server: "{{server}}"
        namespace: arc-systems
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
