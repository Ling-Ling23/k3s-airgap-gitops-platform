apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: app2
  namespace: argocd
  labels:
    team: k3s-admin
    app.kubernetes.io/name: app2
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: team1
  annotations:
    #argocd.argoproj.io/sync-wave: "0"
    description: "ApplicationSet for app2 deployment"
spec:
  generators:
  - clusters:
      selector:
        matchExpressions:
        - key: env
          operator: In
          values: [prod, test, dev]
  template:
    metadata:
      name: "app2-{{metadata.labels.env}}"
      namespace: argocd
      labels:
        app.kubernetes.io/name: app2
        app.kubernetes.io/instance: "app2-{{metadata.labels.env}}"
        app.kubernetes.io/managed-by: argocd
        app.kubernetes.io/part-of: team1
        environment: "{{metadata.labels.env}}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: apps
      sources:
        # Source 1: watch python source code repo — commit SHA injected as helm param
        - $APP_SOME_GH_REPOSITORY-app2.git
          targetRevision: "{{metadata.labels.appGitBranch}}"
          ref: app2Src
        # Source 2: helm chart from infra repo
        - $APP_SOME_GH_REPOSITORY-k3s_deployment.git
          targetRevision: "{{metadata.labels.env}}"
          path: argocd/team1/charts/app2
          helm:
            valueFiles:
              - values/common.yaml
              - "values/{{metadata.labels.env}}.yaml"
            parameters:
              - name: global.srcRevision
                value: $app2Src
      destination:
        server: "{{server}}"
        namespace: team1
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
