apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: mongodb-team1
  namespace: argocd
  labels:
    team: k3s-admin
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: team1
  annotations:
    #argocd.argoproj.io/sync-wave: "0"
    description: "ApplicationSet for mongodb deployment"
spec:
  generators:
  - clusters:
      selector:
        matchExpressions:
        - key: env
          operator: In
          values: [test, dev, prod]
  template:
    metadata:
      name: "mongodb-{{metadata.labels.env}}"
      namespace: argocd
      labels:
        app.kubernetes.io/name: mongodb
        app.kubernetes.io/instance: "mongodb-{{metadata.labels.env}}"
        app.kubernetes.io/managed-by: argocd
        app.kubernetes.io/part-of: team1
        environment: "{{metadata.labels.env}}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: apps
      source:
        $APP_SOME_GH_REPOSITORY-k3s_deployment.git
        targetRevision: "{{metadata.labels.env}}"
        path: argocd/team1/mongodb
        helm:
          valueFiles:
            - values/common.yaml
            - "values/{{metadata.labels.env}}.yaml"
      destination:
        server: "{{server}}"
        namespace: team1
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - RespectIgnoreDifferences=true # tells ArgoCD to skip applying the ignored fields during sync, not just hide them in the UI.
          - ServerSideApply=true          # use server-side apply so ArgoCD tracks ownership via managedFields; prevents phantom OutOfSync from k8s-defaulted fields
      ignoreDifferences: # StatefulSet volumeClaimTemplates are immutable after creation — ArgoCD must not try to reconcile them
      - group: apps
        kind: StatefulSet
        jsonPointers:
          - /spec/volumeClaimTemplates
