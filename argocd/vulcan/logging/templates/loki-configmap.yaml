apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: {{ .Values.namespace }}
  labels:
    app: loki
    app.kubernetes.io/name: loki
    app.kubernetes.io/part-of: {{ index .Values.labels "part-of" }}
    app.kubernetes.io/managed-by: {{ index .Values.labels "managed-by" }}
    environment: {{ .Values.labels.environment }}
    team: {{ .Values.labels.team }}
data:
  local-config.yaml: |
    auth_enabled: false
    #compactor_grpc_address: "dns:///loki-compactor.{{ .Values.namespace }}.svc.cluster.local:9095"
    server:
      http_listen_port: 3100
      #log_level: debug
    ingester:
      lifecycler:
        ring:
          kvstore:
            store: memberlist
          replication_factor: 1
        final_sleep: 0s
      chunk_idle_period: 1h
      chunk_retain_period: 30s

    memberlist:
      join_members:
        - loki.{{ .Values.namespace }}.svc.cluster.local:7946

    schema_config:
      configs:
        - from: 2020-10-15
          store: boltdb-shipper
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    storage_config:
      boltdb_shipper:
        active_index_directory: /var/loki/index
        cache_location: /var/loki/cache
      filesystem:
        directory: /var/loki/chunks

    limits_config:
      allow_structured_metadata: false
      retention_period: 744h  # 31 days for all streams
      retention_stream:
        - selector: '{job="rsyslog"}'
          priority: 1
          period: 168h   # 7 days
        - selector: '{job="containers"}'
          priority: 2
          period: 336h   # 14 days