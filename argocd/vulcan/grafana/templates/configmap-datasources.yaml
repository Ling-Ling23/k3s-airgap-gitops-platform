apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: {{ .Values.namespace }}
  labels:
    app: grafana
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: {{ index .Values.labels "part-of" }}
    app.kubernetes.io/managed-by: {{ index .Values.labels "managed-by" }}
    environment: {{ .Values.labels.environment }}
    team: {{ .Values.labels.team }}
data:
  datasource.yml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.{{ .Values.namespace }}.svc.cluster.local:9090/prometheus
        isDefault: true

      - name: Loki
        type: loki
        access: proxy
        url: http://loki.logging.svc.cluster.local:3100

      - name: app6_data
        type: mysql
        access: proxy
        version: 2
        url: {{ .Values.datasources.warehouseDBdev.url | quote }}
        database: app6
        user: root
        secureJsonData:
          password: ${WAREHOUSE_DB_PASSWORD}
        jsonData:
          sslmode: "disable"

      - name: app6_data_prod
        type: mysql
        access: proxy
        url: {{ .Values.datasources.warehouseDBprod.url | quote }}
        database: app6
        user: root
        secureJsonData:
          password: _fy438z!-Qju~hA1
        jsonData:
          sslmode: "disable"

        #secureJsonData:
        #  password: {{ "$__env{WAREHOUSE_DB_PASSWORD}" }}